<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome | ChatBot App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #b3ffab, #12fff7);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .btn-chat {
            background-color: #00897b;
            color: white;
            transition: background-color 0.3s ease;
        }
        .btn-chat:hover {
            background-color: #00695c;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card p-5">
            <h1 class="mb-3">Welcome to Smart ChatBot</h1>
            <p class="mb-4">Ask questions, get answers, and interact with your documents using AI.</p>
            <a href="{{ url_for('user_bp.login') }}" class="btn btn-chat btn-lg">Start Chatting</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
