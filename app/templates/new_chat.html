<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Start New Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #f1f8e9);
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 1rem;
        }
        .card-header {
            border-radius: 1rem 1rem 0 0;
        }
        .btn {
            border-radius: 0.5rem;
        }
        .form-label {
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0 py-2">📝 Start a New Chat</h4>
            </div>
            <div class="card-body px-4 py-4">
                <form action="{{ url_for('chat.new_chat') }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label for="chat_name" class="form-label">Chat Name</label>
                        <input type="text" name="chat_name" id="chat_name" class="form-control" placeholder="e.g. Legal Documents Chat" required>
                    </div>

                    <div class="mb-4">
                        <label for="pdf" class="form-label">Upload PDF File</label>
                        <input type="file" name="pdf" id="pdf" accept=".pdf" class="form-control" required>
                        <div class="form-text text-muted mt-1">Only .pdf files are supported</div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-success px-4">➕ Create Chat</button>
                        <a href="{{ url_for('chat.dashboard') }}" class="btn btn-outline-secondary px-4">← Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
