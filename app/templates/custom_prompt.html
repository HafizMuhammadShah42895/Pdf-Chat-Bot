<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Custom Prompt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-info text-white">
            <h4 class="mb-0">➕ Add Custom Prompt for: {{ chat.chat_name }}</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label for="custom_prompt" class="form-label">Custom Prompt</label>
                    <textarea name="custom_prompt" id="custom_prompt" rows="6" class="form-control" placeholder="Write your prompt here...">{{ chat.custom_prompt or '' }}</textarea>
                </div>
                <button type="submit" class="btn btn-success">Save Prompt</button>
                <a href="{{ url_for('chat.dashboard') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>

</body>
</html>
